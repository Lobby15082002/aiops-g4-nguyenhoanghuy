groups:
- name: api-slo
  rules:
  - alert: api_burn_rate_tier1
    expr: |
      (sum(rate(http_requests_total{status=~"5..|429"}[1h])) / sum(rate(http_requests_total[1h]))) / (1 - 0.997) >= 7
      AND
      (sum(rate(http_requests_total{status=~"5..|429"}[5m])) / sum(rate(http_requests_total[5m]))) / (1 - 0.997) >= 7
    labels: {severity: page, tier: "1"}
  - alert: api_burn_rate_tier2
    expr: |
      (sum(rate(http_requests_total{status=~"5..|429"}[6h])) / sum(rate(http_requests_total[6h]))) / (1 - 0.997) >= 6
      AND
      (sum(rate(http_requests_total{status=~"5..|429"}[30m])) / sum(rate(http_requests_total[30m]))) / (1 - 0.997) >= 6
    labels: {severity: page, tier: "2"}
  - alert: api_burn_rate_tier3
    expr: |
      (sum(rate(http_requests_total{status=~"5..|429"}[3d])) / sum(rate(http_requests_total[3d]))) / (1 - 0.997) >= 1
      AND
      (sum(rate(http_requests_total{status=~"5..|429"}[6h])) / sum(rate(http_requests_total[6h]))) / (1 - 0.997) >= 1
    labels: {severity: ticket, tier: "3"}

- name: db-slo
  rules:
  - alert: db_burn_rate_tier1
    expr: |
      (sum(rate(db_queries_total{success="false"}[1h])) / sum(rate(db_queries_total[1h]))) / (1 - 0.995) >= 14.4
      AND
      (sum(rate(db_queries_total{success="false"}[5m])) / sum(rate(db_queries_total[5m]))) / (1 - 0.995) >= 14.4
    labels: {severity: page, tier: "1"}
  - alert: db_burn_rate_tier2
    expr: |
      (sum(rate(db_queries_total{success="false"}[6h])) / sum(rate(db_queries_total[6h]))) / (1 - 0.995) >= 6
      AND
      (sum(rate(db_queries_total{success="false"}[30m])) / sum(rate(db_queries_total[30m]))) / (1 - 0.995) >= 6
    labels: {severity: page, tier: "2"}
  - alert: db_burn_rate_tier3
    expr: |
      (sum(rate(db_queries_total{success="false"}[3d])) / sum(rate(db_queries_total[3d]))) / (1 - 0.995) >= 1
      AND
      (sum(rate(db_queries_total{success="false"}[6h])) / sum(rate(db_queries_total[6h]))) / (1 - 0.995) >= 1
    labels: {severity: ticket, tier: "3"}

- name: frontend-slo
  rules:
  - alert: frontend_burn_rate_tier1
    expr: |
      (sum(rate(frontend_page_loads_total{js_error="true"}[1h])) / sum(rate(frontend_page_loads_total[1h]))) / (1 - 0.990) >= 14.4
      AND
      (sum(rate(frontend_page_loads_total{js_error="true"}[5m])) / sum(rate(frontend_page_loads_total[5m]))) / (1 - 0.990) >= 14.4
    labels: {severity: page, tier: "1"}
  - alert: frontend_burn_rate_tier2
    expr: |
      (sum(rate(frontend_page_loads_total{js_error="true"}[6h])) / sum(rate(frontend_page_loads_total[6h]))) / (1 - 0.990) >= 6
      AND
      (sum(rate(frontend_page_loads_total{js_error="true"}[30m])) / sum(rate(frontend_page_loads_total[30m]))) / (1 - 0.990) >= 6
    labels: {severity: page, tier: "2"}
  - alert: frontend_burn_rate_tier3
    expr: |
      (sum(rate(frontend_page_loads_total{js_error="true"}[3d])) / sum(rate(frontend_page_loads_total[3d]))) / (1 - 0.990) >= 1
      AND
      (sum(rate(frontend_page_loads_total{js_error="true"}[6h])) / sum(rate(frontend_page_loads_total[6h]))) / (1 - 0.990) >= 1
    labels: {severity: ticket, tier: "3"}